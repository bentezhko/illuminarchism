<!DOCTYPE html>
<html>
<head>
    <title>Perf Test</title>
</head>
<body>
    <canvas id="map-canvas"></canvas>
    <script type="module">
        import MedievalRenderer from './src/renderer/MedievalRenderer.js';

        const renderer = new MedievalRenderer('map-canvas');

        // Warmup
        const t0 = performance.now();
        renderer.createParchmentTexture();
        const t1 = performance.now();
        console.log(`createParchmentTexture time: ${t1 - t0} ms`);

        const t2 = performance.now();
        renderer.createWaterTexture();
        const t3 = performance.now();
        console.log(`createWaterTexture time: ${t3 - t2} ms`);

        // Test resize which currently calls createParchmentTexture and createWaterTexture
        const start = performance.now();
        for (let i = 0; i < 10; i++) {
            renderer.resize();
        }
        const end = performance.now();
        console.log(`Average resize time (10 runs): ${(end - start) / 10} ms`);
    </script>
</body>
</html>
