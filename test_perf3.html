<!DOCTYPE html>
<html>
<head>
    <title>Perf Test 3</title>
</head>
<body>
    <canvas id="map-canvas"></canvas>
    <canvas id="map-canvas2"></canvas>
    <script type="module">
        import MedievalRenderer from './src/renderer/MedievalRenderer.js';

        const renderer1 = new MedievalRenderer('map-canvas');
        const start1 = performance.now();
        renderer1.createParchmentTexture();
        const end1 = performance.now();
        console.log(`Renderer 1 createParchmentTexture: ${end1 - start1} ms`);

        const renderer2 = new MedievalRenderer('map-canvas2');
        const start2 = performance.now();
        renderer2.createParchmentTexture();
        const end2 = performance.now();
        console.log(`Renderer 2 createParchmentTexture: ${end2 - start2} ms`);
    </script>
</body>
</html>
